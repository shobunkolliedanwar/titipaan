<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Titipaan</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/logo.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap"

  <style>
    :root {
      --bg: #141210;
      --surface: #1E1B18;
      --surface2: #272320;
      --text: #F0EDE6;
      --muted: #8A8580;
      --border: #2E2B27;
      --accent: #E8623A;
      --accent-dim: #3A2218;
      --green: #4CAF80;
      --green-dim: #1A3328;
      --amber: #E8A830;
      --amber-dim: #382A10;
      --red: #E85050;
      --red-dim: #381818;
      --radius: 14px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* LOGIN */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
    }

    .login-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .login-field {
      margin-bottom: 1rem;
    }

    .login-field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: .04em;
    }

    .login-field input {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
    }

    .login-field input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .login-error {
      font-size: 13px;
      color: var(--red);
      margin-top: 8px;
      display: none;
    }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* TOGGLE */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-label {
      font-size: 13px;
      color: var(--muted);
    }

    .toggle {
      width: 44px;
      height: 24px;
      background: var(--border);
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    .toggle.on {
      background: var(--green);
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      transition: left 0.2s;
    }

    .toggle.on::after {
      left: 23px;
    }

    /* MAIN */
    .app {
      display: none;
    }

    .app.visible {
      display: block;
    }

    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem 1rem 4rem;
    }

    /* SUMMARY STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 2rem;
    }

    @media(max-width:600px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .stat-accent {
      color: var(--accent);
    }

    .stat-green {
      color: var(--green);
    }

    .stat-amber {
      color: var(--amber);
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tab {
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.15s;
    }

    .tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .toko-rekap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      margin-bottom: 2rem;
    }

    .toko-rekap-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .toko-rekap-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .toko-rekap-icon {
      font-size: 20px;
    }

    .toko-rekap-nama {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
    }

    .toko-rekap-total {
      font-size: 13px;
      color: var(--accent);
      margin-top: 2px;
    }

    .toko-rekap-item {
      display: flex;
      justify-content: space-between;
      padding: 9px 1.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .toko-rekap-item:last-child {
      border-bottom: none;
    }

    .toko-rekap-item-nama {
      color: var(--text);
    }

    .toko-rekap-item-qty {
      color: var(--muted);
    }

    .toko-rekap-item-total {
      font-weight: 500;
      color: var(--text);
    }

    /* ORDER CARDS */
    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .order-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      gap: 12px;
      flex-wrap: wrap;
    }

    .order-nama {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
    }

    .order-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .order-time {
      font-size: 12px;
      color: var(--muted);
    }

    .order-status {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: .04em;
      cursor: pointer;
      border: none;
      font-family: 'DM Sans', sans-serif;
    }

    .status-menunggu {
      background: var(--amber-dim);
      color: var(--amber);
    }

    .status-lunas {
      background: var(--green-dim);
      color: var(--green);
    }

    .status-batal {
      background: var(--red-dim);
      color: var(--red);
    }

    .order-body {
      padding: 1rem 1.25rem;
    }

    .order-toko-section {
      margin-bottom: 10px;
    }

    .order-toko-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }

    .order-item-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 0;
    }

    .order-total-bar {
      display: flex;
      justify-content: space-between;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }

    .order-catatan {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      font-style: italic;
    }

    .order-footer {
      display: flex;
      gap: 8px;
      padding: 10px 1.25rem;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }

    /* BUKTI MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-box {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.5rem;
      max-width: 480px;
      width: 100%;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 20px;
    }

    .modal-box img {
      width: 100%;
      border-radius: var(--radius-sm);
      margin-top: 12px;
    }

    /* BUTTONS */
    .btn {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.15s;
    }

    .btn:hover {
      opacity: 0.8;
    }

    .btn-accent {
      background: var(--accent);
      color: white;
    }

    .btn-green {
      background: var(--green-dim);
      color: var(--green);
    }

    .btn-red {
      background: var(--red-dim);
      color: var(--red);
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--muted);
    }

    .btn-primary-login {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
    }

    .btn-primary-login:hover {
      opacity: 0.9;
    }

    /* PRINT */
    .btn-print {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-print:hover {
      background: var(--border);
      color: var(--text);
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 14px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--bg);
      padding: 10px 22px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    @media print {

      .header,
      .tabs,
      .filter-bar,
      .order-footer,
      .btn-print,
      .modal-overlay,
      .toast {
        display: none !important;
      }

      body {
        background: white;
        color: black;
      }

      .stat-card,
      .order-card,
      .toko-rekap-card {
        border: 1px solid #ccc;
        break-inside: avoid;
      }

      .tab-content {
        display: block !important;
      }
    }
  </style>
</head>

    function groupByToko(orders) {
      const result = {};

      orders.forEach(order => {
        (order.items || []).forEach(item => {
          const toko = item.toko || "Unknown";

          if (!result[toko]) {
            result[toko] = {
              items: {},
              total: 0
            };
          }

          if (!result[toko].items[item.nama]) {
            result[toko].items[item.nama] = {
              qty: 0,
              total: 0,
            };
          }

          result[toko].items[item.nama].qty += item.qty;
          result[toko].items[item.nama].total += item.sub;

          result[toko].total += item.sub;
        });
      });

      return result;
    }

      const ONGKIR = 2000;

      let total = 0;
      let totalQty = 0;

      editingOrder.items.forEach(i => {

        totalQty += i.qty;
      });

      total += totalQty * ONGKIR;

      editingOrder.totalBayar = total;

      document.getElementById("edit-container").innerHTML += `
        <div style="margin-top:15px; font-weight:600">
          Total + Fee: Rp ${total.toLocaleString("id-ID")}
        </div>
      `;
    }

      const data = groupPerTokoPerOrang(filtered);

      const labelTanggal = dateFilter.from || dateFilter.to
        ? `Filter: ${dateFilter.from?.toLocaleDateString("id-ID") || "..."} - ${dateFilter.to?.toLocaleDateString("id-ID") || "..."}`
        : "Semua tanggal";

      y += 6;

      doc.text("DAFTAR PESANAN PER WARUNG", 10, y);
      y += 10;

      Object.keys(data)
        .sort((a, b) => a.localeCompare(b, "id"))
        .forEach(toko => {

            return [

              order.nama,
              itemsText,
              "Rp" + order.total.toLocaleString("id-ID")
            ];

            startY: y,
            head: [["No", "Nama", "Pesanan", "Total"]],
            body: rows,
            theme: "grid",

      const existing = editingOrder.items.find(i =>

    /* =========================
       SUBSCRIBE ORDERS
    ========================= */
    function subscribeOrders() {
      const q = query(collection(db, "pesanan"), orderBy("createdAt", "desc"));

      onSnapshot(q, (snap) => {
        allOrders = snap.docs.map(d => ({
          id: d.id,
          ...d.data()
        }));

        debug("ORDERS RECEIVED", allOrders);

        renderAll();
      }, (err) => {
        console.error("[ADMIN ERROR] Firestore", err);

        document.getElementById("orders-loading").innerHTML =
          `<div class="empty-state">Firestore error / index missing</div>`;
      });
    }

    function groupPerTokoPerOrang(orders) {
      const result = {};

      orders.forEach(order => {
        (order.items || []).forEach(item => {
          const toko = item.toko || "Unknown";

          if (!result[toko]) {
            result[toko] = [];
          }

          // cari apakah orang ini sudah ada di toko ini
          let existing = result[toko].find(o => o.id === order.id);

          if (!existing) {
            existing = {
              id: order.id,
              nama: order.nama,
              items: [],
              total: 0
            };
            result[toko].push(existing);
          }

          existing.items.push(item);
          existing.total += item.sub;
        });
      });

      return result;
    }

    function renderAll() {

    /* =========================
       STATS
    ========================= */
    function getFilteredOrders() {
      let filtered = allOrders;

      // 1. FILTER STATUS
      if (currentFilter !== "semua") {
        filtered = filtered.filter(o => {
          const statusDatabase = o.status || "menunggu";
          return statusDatabase === currentFilter;
        });
      }

      // 2. FILTER TANGGAL
      filtered = filtered.filter(o => {
        // Jika tidak ada tanggal, tampilkan saja daripada hilang
        if (!o.createdAt || !o.createdAt.toDate) return true;

        const tgl = o.createdAt.toDate();

        // Pastikan dateFilter.from dan to adalah objek Date yang valid
        if (dateFilter.from instanceof Date && tgl < dateFilter.from) return false;

        // Untuk filter "Hingga", kita set ke akhir hari (23:59:59) agar data hari ini ikut masuk
        if (dateFilter.to instanceof Date) {
          const limitTo = new Date(dateFilter.to);
          limitTo.setHours(23, 59, 59, 999);
          if (tgl > limitTo) return false;
        }

        return true;
      });

      return filtered;
    }

    function renderStats() {
      // PAKAI allOrders supaya statistik menghitung SEMUA data di database
      const data = allOrders;

      const total = data.length;
      const lunas = data.filter(o => o.status === "lunas").length;
      const menunggu = data.filter(o => o.status === "menunggu").length;

      // Omzet biasanya hanya menghitung yang sudah Lunas
      const omzet = data
        .filter(o => o.status === "lunas")
        .reduce((a, o) => a + (o.totalBayar || o.grandTotal || 0), 0);

      document.getElementById("stat-total").textContent = total;
      document.getElementById("stat-lunas").textContent = lunas;
      document.getElementById("stat-menunggu").textContent = menunggu;
      document.getElementById("stat-omzet").textContent = "Rp" + (omzet.toLocaleString('id-ID'));
    }

    /* =========================
       RENDER ORDERS (FIXED + SAFE)
    ========================= */
    function renderOrders() {
      const container = document.getElementById("orders-loading");

      if (!container) return;

      let filtered = allOrders;

      // filter status
      if (currentFilter !== "semua") {
        filtered = filtered.filter(o => {
          const statusDatabase = o.status || "menunggu";
          return statusDatabase === currentFilter;
        });
      }

      // 🔥 filter tanggal
      filtered = filtered.filter(o => {
        if (!o.createdAt?.toDate) return true;

        const tgl = o.createdAt.toDate();

        if (dateFilter.from && tgl < dateFilter.from) return false;
        if (dateFilter.to && tgl > dateFilter.to) return false;

        return true;
      });

      debug("FILTER", currentFilter);
      debug("FILTERED COUNT", filtered.length);

      if (!filtered.length) {
        container.innerHTML = `<div class="empty-state">Tidak ada pesanan</div>`;
        return;

      try {
        container.innerHTML = filtered.map(o => {

          (o.items || []).forEach(item => {

            if (!byToko[toko]) byToko[toko] = [];

          ${items.map(i => `

      <div class="order-total-bar">

    </div>

    <!-- 🔥 INI YANG KURANG SEBELUMNYA -->
    <div class="order-footer">
      <button class="btn btn-green" onclick="setStatus('${o.id}', 'lunas')">
        ✓ Lunas
      </button>

      <button class="btn btn-red" onclick="setStatus('${o.id}', 'batal')">
        ✗ Batal
      </button>

      <button class="btn btn-ghost" onclick="cycleStatus('${o.id}', '${o.status || 'menunggu'}')">

          🧾 Bukti Bayar
        </button>
      ` : ``}
    </div>
  </div>
`;
        }).join("");

      } catch (err) {
        console.error("[ADMIN ERROR] renderOrders", err);
        container.innerHTML = `<div class="empty-state">Render error</div>`;
      }
    }

    function renderTokoRekap() {
      const container = document.getElementById("toko-rekap-container");
      if (!container) return;

      const tokoData = {};

      // init semua toko
      TOKO.forEach(t => {
        tokoData[t.id] = {
          ...t,
          total: 0,
          items: {}
        };
      });

      // aggregate data
      getFilteredOrders()
        .filter(o => o.status !== "batal")
        .forEach(order => {
          (order.items || []).forEach(item => {
            const tokoNama = item.toko;

            const toko = TOKO.find(t => t.nama === tokoNama);

            if (!toko) {
              console.warn("Toko tidak ditemukan:", tokoNama);
              return;
            }

            if (!tokoData[toko.id].items[item.nama]) {
              tokoData[toko.id].items[item.nama] = {
                qty: 0,
                total: 0
              };
            }

            tokoData[toko.id].items[item.nama].qty += item.qty;
            tokoData[toko.id].items[item.nama].total += item.sub;

            tokoData[toko.id].total += item.sub;
          });
        });

      // render
      container.innerHTML = TOKO.map(t => {
        const data = tokoData[t.id];
        const items = Object.entries(data.items);

        if (!items.length) {
          return `
        <div class="toko-rekap-card">
          <div class="toko-rekap-header">
            <span class="toko-rekap-icon">${t.icon}</span>
            <div>
              <div class="toko-rekap-nama">${t.nama}</div>
              <div class="toko-rekap-total">Belum ada pesanan</div>
            </div>
          </div>
        </div>
      `;
        }

        return `
      <div class="toko-rekap-card">
        <div class="toko-rekap-header">
          <span class="toko-rekap-icon">${t.icon}</span>
          <div>
            <div class="toko-rekap-nama">${t.nama}</div>
            <div class="toko-rekap-total">Rp${fmt(data.total)}</div>
          </div>
        </div>

        ${items.map(([nama, v]) => `
          <div class="toko-rekap-item">
            <span class="toko-rekap-item-nama">${nama}</span>
            <span class="toko-rekap-item-qty">x${v.qty}</span>
            <span class="toko-rekap-item-total">Rp${fmt(v.total)}</span>
          </div>
        `).join("")}
      </div>
    `;
      }).join("");
    }

      <div id="tab-rekap" class="tab-content active">
        <div class="section-header">
          <div class="section-title">Ringkasan order per warung</div>
        </div>
        <div class="toko-rekap-grid" id="toko-rekap-container">
          <div class="loading">Memuat data...</div>
        </div>
      </div>

      <!-- TAB SEMUA PESANAN -->
      <div id="tab-pesanan" class="tab-content">
        <div class="section-header">
          <div class="section-title">Daftar pesanan</div>
        </div>
        <div class="filter-bar">
          <button class="filter-btn active" data-f="semua" onclick="setFilter('semua')">Semua</button>
          <button class="filter-btn" data-f="menunggu" onclick="setFilter('menunggu')">⏳ Menunggu</button>
          <button class="filter-btn" data-f="lunas" onclick="setFilter('lunas')">✓ Lunas</button>
          <button class="filter-btn" data-f="batal" onclick="setFilter('batal')">✗ Batal</button>

          <!-- 🔥 FILTER TANGGAL -->
          <input type="date" id="date-from" class="filter-btn" onchange="setDateFilter()" />
          <input type="date" id="date-to" class="filter-btn" onchange="setDateFilter()" />

          <button class="filter-btn" onclick="resetDateFilter()">Reset Tanggal</button>
        </div>
        <div id="orders-loading">
          <div class="loading">Memuat pesanan...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL BUKTI -->
  <div class="modal-overlay" id="modal" onclick="if(event.target===this)tutupModal()">
    <div class="modal-box">
      <button class="modal-close" onclick="tutupModal()">✕</button>
      <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:600">Bukti Bayar</div>
      <img id="bukti-img" src="" alt="Bukti bayar">
    </div>
  </div>

  <!-- Modal Edit -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal-box" style="max-width:600px">
      <button class="modal-close" onclick="closeEdit()">✕</button>

      <div style="font-family:'Syne'; font-size:16px; font-weight:600">
        Edit Pesanan
      </div>

      <div id="edit-container" style="margin-top:15px"></div>

      <button class="btn btn-accent" style="margin-top:15px; width:100%" onclick="saveEdit()">
        Simpan Perubahan
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</body>

</html>
